<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramo de Tulipanes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #fce4ec;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        h1 {
            color: #c2185b;
            margin-bottom: 24px;
            font-size: 32px;
            text-align: center;
        }

        #btnRamo {
            background-color: #e91e63;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 30px;
            transition: background-color 0.2s ease;
        }

        #btnRamo:hover {
            background-color: #c2185b;
        }

        #contenedor {
            display: none;
            text-align: center;
        }

        #ramo {
            position: relative;
            width: 350px;
            height: 350px;
            margin: 0 auto;
        }

        .tulipan {
            position: absolute;
            font-size: 45px;
            animation: aparecer 0.4s ease-in forwards;
            opacity: 0;
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: scale(0) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .lazo {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 60px;
            animation: aparecer 0.5s ease-in 2.1s forwards;
            opacity: 0;
        }

        #imagenAbajo {
            width: 300px;
            border-radius: 12px;
            margin-top: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border: 4px solid white;
            animation: aparecer 0.5s ease-in 2.3s forwards;
            opacity: 0;
        }

        #mensaje {
            margin-top: 20px;
            font-size: 18px;
            color: #880e4f;
            font-weight: 500;
            height: 25px;
        }
    </style>
</head>
<body>

    <h1>Ramo de 20 Tulipanes</h1>
    <button id="btnRamo">Armar ramo de tulipanes</button>
    
    <div id="contenedor">
        <div id="ramo"></div>
        <img src="img/35.jpeg" alt="">
        <p id="mensaje"></p>
    </div>

    <script>
        const btnRamo = document.getElementById('btnRamo');
        const contenedor = document.getElementById('contenedor');
        const ramo = document.getElementById('ramo');
        const mensaje = document.getElementById('mensaje');

        btnRamo.addEventListener('click', function() {
            ramo.innerHTML = '';
            contenedor.style.display = 'block';
            mensaje.textContent = '';
            
            const posiciones = [
                {x: 175, y: 50}, {x: 130, y: 60}, {x: 220, y: 60},
                {x: 95, y: 85}, {x: 175, y: 85}, {x: 255, y: 85},
                {x: 70, y: 120}, {x: 140, y: 120}, {x: 210, y: 120}, {x: 280, y: 120},
                {x: 60, y: 160}, {x: 120, y: 155}, {x: 175, y: 150}, {x: 230, y: 155}, {x: 290, y: 160},
                {x: 90, y: 200}, {x: 150, y: 195}, {x: 200, y: 195}, {x: 260, y: 200},
                {x: 175, y: 230}
            ];

            for (let i = 0; i < 20; i++) {
                const tulipan = document.createElement('div');
                tulipan.className = 'tulipan';
                tulipan.textContent = '🌷';
                tulipan.style.left = `${posiciones[i].x - 22}px`;
                tulipan.style.top = `${posiciones[i].y}px`;
                tulipan.style.animationDelay = `${i * 0.1}s`;
                ramo.appendChild(tulipan);
            }

            const lazo = document.createElement('div');
            lazo.className = 'lazo';
            lazo.textContent = '🎀';
            ramo.appendChild(lazo);
            
            setTimeout(() => {
                mensaje.textContent = '¡Tu ramo de 20 tulipanes está listo!';
            }, 2500);
            
            btnRamo.textContent = 'Armar otro ramo';
        });
    </script>
</body>
</html>
