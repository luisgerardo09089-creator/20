<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jardín de 20 Flores</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #e8f5e9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            color: #2e7d32;
            margin-bottom: 24px;
            font-size: 32px;
        }

        #btnFlores {
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 30px;
            transition: background-color 0.2s ease;
        }

        #btnFlores:hover {
            background-color: #388e3c;
        }

        #btnFlores:disabled {
            background-color: #a5d6a7;
            cursor: not-allowed;
        }

        #jardin {
            display: none;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 800px;
        }

        .flor {
            font-size: 50px;
            animation: aparecer 0.5s ease-in;
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: scale(0);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        #contador {
            margin-top: 20px;
            font-size: 18px;
            color: #1b5e20;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <h1>Mi Jardín Virtual</h1>
    <button id="btnFlores">Mostrar 20 flores</button>
    
    <div id="jardin"></div>
    <p id="contador"></p>

    <script>
        const btnFlores = document.getElementById('btnFlores');
        const jardin = document.getElementById('jardin');
        const contador = document.getElementById('contador');
        
        // Array de emojis de flores diferentes
        const emojisFlores = ['🌸', '🌺', '🌻', '🌷', '🌹', '🪻', '🌼', '💐', '🏵️', '🪷'];

        btnFlores.addEventListener('click', function() {
            // Limpiamos por si ya había flores
            jardin.innerHTML = '';
            jardin.style.display = 'flex';
            
            // Creamos 20 flores
            for (let i = 0; i < 20; i++) {
                const flor = document.createElement('div');
                flor.className = 'flor';
                // Elegimos una flor random del array
                flor.textContent = emojisFlores[Math.floor(Math.random() * emojisFlores.length)];
                // Delay para que aparezcan una por una
                flor.style.animationDelay = `${i * 0.1}s`;
                jardin.appendChild(flor);
            }
            
            contador.textContent = '¡Se plantaron 20 flores!';
            btnFlores.textContent = 'Plantar de nuevo';
        });
    </script>
</body>
</html>
